name: Build CP2K Windows Installer / 打包 CP2K Windows 安装程序

on:
  # 手动触发（在 GitHub 网页上点按钮就能运行）
  workflow_dispatch:
  # 每次推送代码自动运行
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022  # 固定 runner，减少宿主环境漂移

    steps:
      # ── 第1步：下载代码 ──
      - name: 下载代码
        uses: actions/checkout@v4

      # ── 第2步：设置 WSL2 + Ubuntu 24.04 ──
      - name: 安装 WSL2 和 Ubuntu 24.04
        uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-24.04
          use-cache: 'false'

      # ── 第3步：源码构建 CP2K 2026.1 ──
      # conda-forge 预编译包在 GitHub Actions 的 WSL 环境中出现 SIGILL，
      # 这里改为下载官方 2026.1 release 源码并在 Ubuntu 24.04 内构建。
      - name: 源码构建 CP2K 2026.1 / Build CP2K 2026.1 from source
        shell: wsl-bash {0}
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            build-essential \
            bzip2 \
            ca-certificates \
            gfortran \
            git \
            libtool \
            m4 \
            patch \
            perl \
            pkg-config \
            python3 \
            wget

          CP2K_VERSION=2026.1
          CP2K_TAG="v${CP2K_VERSION}"
          CP2K_TARBALL="cp2k-${CP2K_VERSION}.tar.bz2"
          CP2K_URL="https://github.com/cp2k/cp2k/releases/download/${CP2K_TAG}/${CP2K_TARBALL}"
          CP2K_WORK_ROOT="/opt/cp2k-source"
          CP2K_RUNTIME_ROOT="/opt/cp2k"
          CP2K_TOOLCHAIN_ROOT="${CP2K_WORK_ROOT}/tools/toolchain/install"

          echo "Downloading CP2K ${CP2K_VERSION} sources..."
          wget -q "${CP2K_URL}" -O "/tmp/${CP2K_TARBALL}"

          rm -rf "${CP2K_WORK_ROOT}" "${CP2K_RUNTIME_ROOT}" "/opt/cp2k-${CP2K_VERSION}"
          mkdir -p "${CP2K_RUNTIME_ROOT}/bin" "${CP2K_RUNTIME_ROOT}/data" "${CP2K_RUNTIME_ROOT}/toolchain"

          tar -xjf "/tmp/${CP2K_TARBALL}" -C /opt
          mv "/opt/cp2k-${CP2K_VERSION}" "${CP2K_WORK_ROOT}"

          cd "${CP2K_WORK_ROOT}"
          if [ ! -x ./tools/toolchain/install_cp2k_toolchain.sh ]; then
            echo "install_cp2k_toolchain.sh was not found in the CP2K ${CP2K_VERSION} release."
            exit 1
          fi

          echo "Installing CP2K toolchain dependencies..."
          cd "${CP2K_WORK_ROOT}/tools/toolchain"
          ./install_cp2k_toolchain.sh --install-all --mpi-mode=mpich -j 4

          if [ ! -f "${CP2K_TOOLCHAIN_ROOT}/setup" ] || [ ! -f "${CP2K_TOOLCHAIN_ROOT}/arch/local.psmp" ]; then
            echo "CP2K toolchain did not produce the expected setup files."
            exit 1
          fi

          echo "Compiling CP2K ${CP2K_VERSION}..."
          . "${CP2K_TOOLCHAIN_ROOT}/setup"
          cd "${CP2K_WORK_ROOT}"
          cp "${CP2K_TOOLCHAIN_ROOT}/arch/local.psmp" arch/
          make -j 4 ARCH=local VERSION=psmp

          if [ ! -x "${CP2K_WORK_ROOT}/exe/local/cp2k.psmp" ]; then
            echo "Built cp2k binary was not found at exe/local/cp2k.psmp."
            find "${CP2K_WORK_ROOT}" -maxdepth 4 -type f -name 'cp2k*' || true
            exit 1
          fi

          install -Dm755 "${CP2K_WORK_ROOT}/exe/local/cp2k.psmp" "${CP2K_RUNTIME_ROOT}/bin/cp2k"
          cp -a "${CP2K_WORK_ROOT}/data/." "${CP2K_RUNTIME_ROOT}/data/"
          cp -a "${CP2K_TOOLCHAIN_ROOT}/." "${CP2K_RUNTIME_ROOT}/toolchain/"
          sed "s|${CP2K_TOOLCHAIN_ROOT}|/opt/cp2k/toolchain|g" \
            "${CP2K_TOOLCHAIN_ROOT}/setup" > "${CP2K_RUNTIME_ROOT}/toolchain/setup"
          if grep -Fq "${CP2K_WORK_ROOT}" "${CP2K_RUNTIME_ROOT}/toolchain/setup"; then
            echo "The packaged toolchain setup script still references the temporary build tree."
            exit 1
          fi

          # 创建全局软链接，所有 shell 中均可直接使用 cp2k 命令
          ln -sf /opt/cp2k/bin/cp2k /usr/local/bin/cp2k
          # /etc/profile.d 覆盖登录 shell（bash -l）
          cat > /etc/profile.d/cp2k.sh <<'EOF'
          if [ -f /opt/cp2k/toolchain/setup ]; then
            . /opt/cp2k/toolchain/setup >/dev/null 2>&1 || true
          fi
          export PATH=/opt/cp2k/bin:$PATH
          export CP2K_DATA_DIR=/opt/cp2k/data
          export LD_LIBRARY_PATH=/opt/cp2k/toolchain/lib:/opt/cp2k/toolchain/lib64:${LD_LIBRARY_PATH:-}
          EOF
          chmod +x /etc/profile.d/cp2k.sh
          : > /etc/ld.so.conf.d/cp2k.conf
          for libdir in /opt/cp2k/toolchain/lib /opt/cp2k/toolchain/lib64; do
            if [ -d "${libdir}" ]; then
              echo "${libdir}" >> /etc/ld.so.conf.d/cp2k.conf
            fi
          done
          ldconfig
          # /etc/bash.bashrc 覆盖非登录交互式 shell（`wsl -d CP2K --cd` 默认走此路径）
          # 以免用户在桌面快捷方式启动的 shell 里找不到 cp2k 或 CP2K_DATA_DIR
          if ! grep -q 'CP2K_DATA_DIR' /etc/bash.bashrc 2>/dev/null; then
            cat >> /etc/bash.bashrc <<'EOF'

          # CP2K environment
          if [ -f /opt/cp2k/toolchain/setup ]; then
            . /opt/cp2k/toolchain/setup >/dev/null 2>&1 || true
          fi
          export PATH=/opt/cp2k/bin:$PATH
          export CP2K_DATA_DIR=/opt/cp2k/data
          export LD_LIBRARY_PATH=/opt/cp2k/toolchain/lib:/opt/cp2k/toolchain/lib64:${LD_LIBRARY_PATH:-}
          EOF
          fi

          # 验证安装
          cp2k --version
          echo "CP2K 2026.1 installed successfully"

      # ── 第3.5步：将实际 CP2K 版本号注入启动脚本（在清理之前）──
      # 直接从 Windows 侧调用 wsl 查询版本，避免在 wsl-bash 内写 $GITHUB_ENV 的跨环境问题
      - name: 注入 CP2K 版本号到启动脚本 / Inject CP2K version into launcher
        shell: powershell
        run: |
          # 从 WSL 直接查询已安装的 CP2K 版本
          $rawLines = wsl -d Ubuntu-24.04 -- bash -c "cp2k --version 2>/dev/null" 2>$null
          if (-not $rawLines) {
            $rawLines = wsl -d Ubuntu -- bash -c "cp2k --version 2>/dev/null" 2>$null
          }
          $verLine = $rawLines | Where-Object { $_ -match "CP2K version" } | Select-Object -First 1
          if ($verLine -match "CP2K version\s+([\d.]+)") {
            $ver = $Matches[1]
          } else {
            $ver = "2026.1"   # 兜底值
          }
          Write-Host "Detected CP2K version: $ver"

          # 替换 cp2k_shell.bat 中的版本号行
          # 注意：必须用无 BOM 的 UTF-8 写入，否则 cmd.exe 读到 BOM 会导致 @echo off 失效
          $batPath = "scripts\cp2k_shell.bat"
          $content = (Get-Content $batPath -Encoding UTF8) `
            -replace "Version / 版本: [^\r\n]*", "Version / 版本: $ver"
          [System.IO.File]::WriteAllLines(
            (Resolve-Path $batPath).Path,
            $content,
            [System.Text.UTF8Encoding]::new($false)   # $false = 不写 BOM
          )
          Write-Host "Version injected into $batPath successfully (UTF-8 no BOM)"

      # ── 第3.6步：清理源码构建缓存，减小镜像体积 ──
      - name: 清理缓存，减小镜像体积 / Clean up cache to reduce image size
        shell: wsl-bash {0}
        run: |
          echo "清理前磁盘占用 / Disk usage before cleanup:"
          du -sh /opt/cp2k 2>/dev/null || true
          du -sh /opt/cp2k-source 2>/dev/null || true

          # 清理 apt 缓存
          apt-get clean
          rm -rf /var/lib/apt/lists/*

          # 删除源码树和中间构建产物，只保留运行时文件
          rm -rf /opt/cp2k-source

          # 清理临时文件和缓存
          rm -rf /tmp/*
          rm -rf /root/.cache

          echo "清理后磁盘占用 / Disk usage after cleanup:"
          du -sh /opt/cp2k 2>/dev/null || true

      # ── 第4步：导出 WSL 镜像 ──
      - name: 导出 WSL 镜像
        shell: cmd
        run: |
          echo 已安装的 WSL 发行版：
          wsl -l -v
          echo 尝试导出 Ubuntu-24.04...
          wsl --export Ubuntu-24.04 cp2k_distro.tar
          if exist cp2k_distro.tar goto :success
          echo 尝试导出 Ubuntu...
          wsl --export Ubuntu cp2k_distro.tar
          if exist cp2k_distro.tar goto :success
          echo 所有名称均失败，再次列出发行版：
          wsl -l -v
          exit /b 1
          :success
          echo 导出成功！

      # ── 第5步：安装 Inno Setup ──
      - name: 安装 Inno Setup
        shell: powershell
        run: |
          choco install innosetup --yes --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) { Write-Host "Inno Setup 安装成功" } else { throw "Inno Setup 安装失败" }

      # ── 第5.5步：下载 Inno Setup 中文语言包 ──
      - name: 下载中文语言包 / Download Chinese language pack
        shell: powershell
        run: |
          $dest = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
          $url  = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          if (Test-Path $dest) { Write-Host "中文语言包下载成功 / Chinese language pack downloaded" } else { throw "下载失败 / Download failed" }

      # ── 第6步：编译安装包 ──
      - name: 编译 Windows 安装包
        shell: cmd
        run: |
          mkdir output 2>nul
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" "installer\cp2k_setup.iss"
          if errorlevel 1 (
            echo 编译失败
            exit /b 1
          )
          echo 编译成功

      # ── 第7步：上传安装包（供下载）──
      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: CP2K-Windows-installer
          path: output/*.exe
          retention-days: 30  # 保存 30 天

      # ── 显示安装包信息 ──
      - name: 显示安装包信息
        shell: powershell
        run: |
          $exe = Get-ChildItem output\*.exe | Select-Object -First 1
          if ($exe) {
            $size = [math]::Round($exe.Length / 1MB, 1)
            Write-Host "==========================================="
            Write-Host " 打包成功！"
            Write-Host " 文件名: $($exe.Name)"
            Write-Host " 大小: ${size} MB"
            Write-Host "==========================================="
            Write-Host "请在 GitHub Actions 页面的 Artifacts 区域下载"
          }
