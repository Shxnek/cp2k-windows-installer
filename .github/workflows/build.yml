name: Build CP2K Windows Installer / 打包 CP2K Windows 安装程序

on:
  # 手动触发（在 GitHub 网页上点按钮就能运行）
  workflow_dispatch:
  # 每次推送代码自动运行
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest  # 使用 GitHub 提供的免费 Windows 虚拟机

    steps:
      # ── 第1步：下载代码 ──
      - name: 下载代码
        uses: actions/checkout@v4

      # ── 第2步：设置 WSL2 + Ubuntu 24.04 ──
      - name: 安装 WSL2 和 Ubuntu 24.04
        uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-24.04
          use-cache: 'false'

      # ── 第3步：通过 conda-forge 安装 CP2K 2026.1（最新版）──
      # apt 仓库的 cp2k 版本过旧，conda-forge 提供跨发行版的最新预编译包
      - name: 安装 CP2K 2026.1（conda-forge）/ Install CP2K 2026.1
        shell: wsl-bash {0}
        run: |
          apt-get update -qq
          apt-get install -y wget

          # 安装 Miniforge（轻量级 conda，专为 conda-forge 优化）
          echo "Installing Miniforge..."
          wget -q \
            "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh" \
            -O /tmp/miniforge.sh
          bash /tmp/miniforge.sh -b -p /opt/conda
          rm /tmp/miniforge.sh

          # 从 conda-forge 安装 CP2K 2026.1
          echo "Installing CP2K 2026.1 from conda-forge..."
          /opt/conda/bin/conda install -y -c conda-forge cp2k=2026.1

          # 创建全局软链接，所有 shell 中均可直接使用 cp2k 命令
          ln -sf /opt/conda/bin/cp2k /usr/local/bin/cp2k
          # 同时写入 profile.d，保证交互式 shell PATH 正常
          echo 'export PATH=/opt/conda/bin:$PATH' > /etc/profile.d/cp2k.sh
          chmod +x /etc/profile.d/cp2k.sh

          # 验证安装
          cp2k --version
          echo "CP2K 2026.1 installed successfully"

          # 将实际版本号写入 GitHub Actions 环境变量，供后续步骤使用
          CP2K_VER=$(cp2k --version 2>/dev/null | grep "CP2K version" | awk '{print $3}')
          echo "CP2K_VER=${CP2K_VER}" >> $GITHUB_ENV
          echo "Detected version: ${CP2K_VER}"

      # ── 第3.5步：将实际 CP2K 版本号注入启动脚本（在清理之前）──
      - name: 注入 CP2K 版本号到启动脚本 / Inject CP2K version into launcher
        shell: powershell
        run: |
          # 从 GitHub Actions 环境变量读取版本号（由上一步写入）
          $ver = "$env:CP2K_VER"
          if (-not $ver) { $ver = "2026.1" }   # 兜底值
          $ver = $ver.Trim()
          Write-Host "Injecting CP2K version: $ver"

          # 替换 cp2k_shell.bat 中的版本号行
          $batPath = "scripts\cp2k_shell.bat"
          (Get-Content $batPath -Encoding UTF8) `
            -replace "Version / 版本: [^\r\n]*", "Version / 版本: $ver" |
            Set-Content $batPath -Encoding UTF8
          Write-Host "Version injected successfully into $batPath"

      # ── 第3.6步：清理 conda 缓存，减小镜像体积 ──
      - name: 清理缓存，减小镜像体积 / Clean up cache to reduce image size
        shell: wsl-bash {0}
        run: |
          echo "清理前磁盘占用 / Disk usage before cleanup:"
          du -sh /opt/conda 2>/dev/null || true

          # 清理 conda 包缓存（安装完后不再需要）
          /opt/conda/bin/conda clean --all -y

          # 清理 apt 缓存
          apt-get clean
          rm -rf /var/lib/apt/lists/*

          # 清理临时文件和编译缓存
          rm -rf /tmp/*
          rm -rf /root/.cache

          echo "清理后磁盘占用 / Disk usage after cleanup:"
          du -sh /opt/conda 2>/dev/null || true

      # ── 第4步：导出 WSL 镜像 ──
      - name: 导出 WSL 镜像
        shell: cmd
        run: |
          echo 已安装的 WSL 发行版：
          wsl -l -v
          echo 尝试导出 Ubuntu-24.04...
          wsl --export Ubuntu-24.04 cp2k_distro.tar
          if exist cp2k_distro.tar goto :success
          echo 尝试导出 Ubuntu...
          wsl --export Ubuntu cp2k_distro.tar
          if exist cp2k_distro.tar goto :success
          echo 所有名称均失败，再次列出发行版：
          wsl -l -v
          exit /b 1
          :success
          echo 导出成功！

      # ── 第5步：安装 Inno Setup ──
      - name: 安装 Inno Setup
        shell: powershell
        run: |
          choco install innosetup --yes --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) { Write-Host "Inno Setup 安装成功" } else { throw "Inno Setup 安装失败" }

      # ── 第5.5步：下载 Inno Setup 中文语言包 ──
      - name: 下载中文语言包 / Download Chinese language pack
        shell: powershell
        run: |
          $dest = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
          $url  = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          if (Test-Path $dest) { Write-Host "中文语言包下载成功 / Chinese language pack downloaded" } else { throw "下载失败 / Download failed" }

      # ── 第6步：编译安装包 ──
      - name: 编译 Windows 安装包
        shell: cmd
        run: |
          mkdir output 2>nul
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" "installer\cp2k_setup.iss"
          if errorlevel 1 (
            echo 编译失败
            exit /b 1
          )
          echo 编译成功

      # ── 第7步：上传安装包（供下载）──
      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: CP2K-Windows-installer
          path: output/*.exe
          retention-days: 30  # 保存 30 天

      # ── 显示安装包信息 ──
      - name: 显示安装包信息
        shell: powershell
        run: |
          $exe = Get-ChildItem output\*.exe | Select-Object -First 1
          if ($exe) {
            $size = [math]::Round($exe.Length / 1MB, 1)
            Write-Host "==========================================="
            Write-Host " 打包成功！"
            Write-Host " 文件名: $($exe.Name)"
            Write-Host " 大小: ${size} MB"
            Write-Host "==========================================="
            Write-Host "请在 GitHub Actions 页面的 Artifacts 区域下载"
          }
