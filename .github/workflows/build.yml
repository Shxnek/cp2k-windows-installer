name: Build CP2K Windows Installer / 打包 CP2K Windows 安装程序

on:
  # 手动触发（在 GitHub 网页上点按钮就能运行）
  workflow_dispatch:
  # 每次推送代码自动运行
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest  # 使用 GitHub 提供的免费 Windows 虚拟机

    steps:
      # ── 第1步：下载代码 ──
      - name: 下载代码
        uses: actions/checkout@v4

      # ── 第2步：设置 WSL2 + Ubuntu ──
      - name: 安装 WSL2 和 Ubuntu
        uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-22.04
          use-cache: 'false'

      # ── 第3步：安装 CP2K 2025.1（官方预编译二进制）──
      - name: 安装 CP2K 2025.1 / Install CP2K 2025.1
        shell: wsl-bash {0}
        run: |
          apt-get update -qq
          apt-get install -y libgomp1 wget bzip2

          # 下载官方预编译二进制（689 MB，OpenMP 并行版）
          echo "Downloading CP2K 2025.1 binary (~689 MB)..."
          wget -q --show-progress \
            "https://github.com/cp2k/cp2k/releases/download/v2025.1/cp2k-2025.1-Linux-gnu-x86_64.ssmp" \
            -O /usr/local/bin/cp2k
          chmod +x /usr/local/bin/cp2k

          # 下载源码包并提取数据文件（BASIS_SETS / POTENTIAL 等）
          echo "Downloading CP2K data files (~70 MB)..."
          wget -q \
            "https://github.com/cp2k/cp2k/releases/download/v2025.1/cp2k-2025.1.tar.bz2" \
            -O /tmp/cp2k.tar.bz2
          mkdir -p /usr/share/cp2k
          tar -xjf /tmp/cp2k.tar.bz2 -C /tmp/ cp2k-2025.1/data/
          mv /tmp/cp2k-2025.1/data /usr/share/cp2k/data
          rm /tmp/cp2k.tar.bz2

          # 设置数据目录环境变量（所有 shell 类型均可读取）
          echo 'export CP2K_DATA_DIR=/usr/share/cp2k/data' > /etc/profile.d/cp2k.sh
          chmod +x /etc/profile.d/cp2k.sh
          echo 'CP2K_DATA_DIR=/usr/share/cp2k/data' >> /etc/environment

          # 验证安装
          CP2K_DATA_DIR=/usr/share/cp2k/data /usr/local/bin/cp2k --version
          echo "CP2K 2025.1 installed successfully"

      # ── 第4步：导出 WSL 镜像 ──
      - name: 导出 WSL 镜像
        shell: cmd
        run: |
          echo 已安装的 WSL 发行版：
          wsl -l -v
          echo 尝试导出 Ubuntu-22.04...
          wsl --export Ubuntu-22.04 cp2k_distro.tar
          if exist cp2k_distro.tar goto :success
          echo 尝试导出 Ubuntu...
          wsl --export Ubuntu cp2k_distro.tar
          if exist cp2k_distro.tar goto :success
          echo 所有名称均失败，再次列出发行版：
          wsl -l -v
          exit /b 1
          :success
          echo 导出成功！

      # ── 第5步：安装 Inno Setup ──
      - name: 安装 Inno Setup
        shell: powershell
        run: |
          choco install innosetup --yes --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) { Write-Host "Inno Setup 安装成功" } else { throw "Inno Setup 安装失败" }

      # ── 第5.5步：下载 Inno Setup 中文语言包 ──
      - name: 下载中文语言包 / Download Chinese language pack
        shell: powershell
        run: |
          $dest = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
          $url  = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          if (Test-Path $dest) { Write-Host "中文语言包下载成功 / Chinese language pack downloaded" } else { throw "下载失败 / Download failed" }

      # ── 第6步：编译安装包 ──
      - name: 编译 Windows 安装包
        shell: cmd
        run: |
          mkdir output 2>nul
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" "installer\cp2k_setup.iss"
          if errorlevel 1 (
            echo 编译失败
            exit /b 1
          )
          echo 编译成功

      # ── 第7步：上传安装包（供下载）──
      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: CP2K-Windows-installer
          path: output/*.exe
          retention-days: 30  # 保存 30 天

      # ── 显示安装包信息 ──
      - name: 显示安装包信息
        shell: powershell
        run: |
          $exe = Get-ChildItem output\*.exe | Select-Object -First 1
          if ($exe) {
            $size = [math]::Round($exe.Length / 1MB, 1)
            Write-Host "==========================================="
            Write-Host " 打包成功！"
            Write-Host " 文件名: $($exe.Name)"
            Write-Host " 大小: ${size} MB"
            Write-Host "==========================================="
            Write-Host "请在 GitHub Actions 页面的 Artifacts 区域下载"
          }
